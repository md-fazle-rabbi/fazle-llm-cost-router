services:
  - type: web
    name: fazle-llm-cost-router
    runtime: docker
    plan: free
    healthCheckPath: /docs

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 1.0.0
      - key: CHEAP_MODEL
        value: gemini/gemini-3.1-flash-lite
      - key: EXPENSIVE_MODEL
        value: gemini/gemini-3.5-flash
      - key: COMPLEXITY_THRESHOLD
        value: '0.5'
      - key: MAX_TOKENS_CHEAP
        value: '150'
      - key: CACHE_TTL_SECONDS
        value: '3600'
      - key: LANGFUSE_BASE_URL
        value: https://cloud.langfuse.com
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_PROJECT_ID
        sync: false
